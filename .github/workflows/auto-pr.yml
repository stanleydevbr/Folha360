name: Auto PR — Feature → Develop

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Source branch (default: current branch)'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.source_branch != ''

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine source and target branches
        id: branches
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SOURCE="${{ github.event.inputs.source_branch }}"
          else
            SOURCE="${{ github.ref_name }}"
          fi
          TARGET="develop"
          echo "source=${SOURCE}" >> $GITHUB_OUTPUT
          echo "target=${TARGET}" >> $GITHUB_OUTPUT
          echo "Source: ${SOURCE} → Target: ${TARGET}"

      - name: Check if PR already exists
        id: check-pr
        uses: actions/github-script@v7
        with:
          script: |
            const headLabel = context.repo.owner + ':' + '${{ steps.branches.outputs.source }}';
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: headLabel,
              base: '${{ steps.branches.outputs.target }}',
              state: 'open'
            });
            if (pulls.length > 0) {
              core.setOutput('pr_number', pulls[0].number);
              core.setOutput('pr_url', pulls[0].html_url);
              core.setOutput('exists', 'true');
              core.notice('PR #' + pulls[0].number + ' already exists: ' + pulls[0].html_url);
            } else {
              core.setOutput('exists', 'false');
            }

      - name: Generate PR title and body
        id: pr-title
        if: steps.check-pr.outputs.exists == 'false'
        run: |
          SOURCE="${{ steps.branches.outputs.source }}"
          TARGET="${{ steps.branches.outputs.target }}"

          FIRST_COMMIT=$(git log origin/${TARGET}..HEAD --pretty=format:"%s" --reverse 2>/dev/null | head -1)
          if [ -z "$FIRST_COMMIT" ]; then
            FIRST_COMMIT="Merge ${SOURCE} into ${TARGET}"
          fi
          echo "title=${FIRST_COMMIT}" >> $GITHUB_OUTPUT

          COMMITS=$(git log origin/${TARGET}..HEAD --pretty=format:"- %s" 2>/dev/null || git log HEAD~5..HEAD --pretty=format:"- %s")

          BODY="## Resumo

          Merge automático de \`${SOURCE}\` → \`${TARGET}\`.

          ## Commits incluídos

          ${COMMITS}

          ## Checklist

          - [ ] Código compila sem erros (\`dotnet build\`)
          - [ ] Testes passam (\`dotnet test\`)
          - [ ] Code review realizado
          - [ ] Sem breaking changes não documentados

          > 🤖 Este PR foi gerado automaticamente pela action \`auto-pr.yml\`."

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "${BODY}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create-pr
        if: steps.check-pr.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '${{ steps.pr-title.outputs.title }}',
              head: '${{ steps.branches.outputs.source }}',
              base: '${{ steps.branches.outputs.target }}',
              body: '${{ steps.pr-title.outputs.body }}'
            });
            core.setOutput('pr_url', pr.data.html_url);
            core.notice('PR created: ' + pr.data.html_url);

      - name: Add labels to PR
        if: steps.check-pr.outputs.exists == 'false' || steps.check-pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = parseInt('${{ steps.check-pr.outputs.pr_number }}') || 0;
            if (prNumber === 0) {
              const url = '${{ steps.create-pr.outputs.pr_url }}';
              if (!url) {
                core.warning('Could not determine PR number');
                return;
              }
              const match = url.match(/\/pull\/(\d+)$/);
              if (!match) {
                core.warning('Could not parse PR number from URL: ' + url);
                return;
              }
              prNumber = parseInt(match[1]);
            }
            const source = '${{ steps.branches.outputs.source }}';
            const labels = ['auto-pr'];
            if (source.startsWith('feature/')) {
              labels.push('enhancement');
            }
            if (source.startsWith('fix/')) {
              labels.push('bug');
            }
            if (source.startsWith('hotfix/')) {
              labels.push('hotfix');
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: labels
            });
            core.notice('Labels added: ' + labels.join(', '));

      - name: Summary
        run: |
          if [ "${{ steps.check-pr.outputs.exists }}" = "true" ]; then
            echo "✅ PR already exists: ${{ steps.check-pr.outputs.pr_url }}"
          else
            echo "✅ PR created successfully!"
          fi
