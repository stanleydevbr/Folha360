name: Auto PR — Feature → Develop

on:
    push:
        branches:
            - "feature/**"
            - "fix/**"
            - "hotfix/**"
    workflow_dispatch:
        inputs:
            source_branch:
                description: "Source branch (default: current branch)"
                required: false
                type: string

permissions:
    contents: read
    pull-requests: write

jobs:
    auto-pr:
        runs-on: ubuntu-latest
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.source_branch != ''

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Determine source and target branches
              id: branches
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    SOURCE="${{ github.event.inputs.source_branch }}"
                  else
                    SOURCE="${{ github.ref_name }}"
                  fi
                  TARGET="develop"
                  echo "source=${SOURCE}" >> $GITHUB_OUTPUT
                  echo "target=${TARGET}" >> $GITHUB_OUTPUT
                  echo "Source: ${SOURCE} → Target: ${TARGET}"

            - name: Check if PR already exists
              id: check-pr
              uses: actions/github-script@v7
              with:
                  script: |
                      const { data: pulls } = await github.rest.pulls.list({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        head: `${context.repo.owner}:${{ steps.branches.outputs.source }}`,
                        base: '${{ steps.branches.outputs.target }}',
                        state: 'open'
                      });
                      if (pulls.length > 0) {
                        core.setOutput('pr_number', pulls[0].number);
                        core.setOutput('pr_url', pulls[0].html_url);
                        core.setOutput('exists', 'true');
                        core.notice(`PR #${pulls[0].number} already exists: ${pulls[0].html_url}`);
                      } else {
                        core.setOutput('exists', 'false');
                      }

            - name: Generate PR title from commits
              id: pr-title
              if: steps.check-pr.outputs.exists == 'false'
              run: |
                  SOURCE="${{ steps.branches.outputs.source }}"
                  TARGET="${{ steps.branches.outputs.target }}"

                  # Get the first conventional commit message as PR title
                  FIRST_COMMIT=$(git log origin/${TARGET}..HEAD --pretty=format:"%s" --reverse | head -1)
                  if [ -z "$FIRST_COMMIT" ]; then
                    FIRST_COMMIT="Merge ${SOURCE} into ${TARGET}"
                  fi
                  echo "title=${FIRST_COMMIT}" >> $GITHUB_OUTPUT

                  # Generate body from all commits
                  COMMITS=$(git log origin/${TARGET}..HEAD --pretty=format:"- %s" 2>/dev/null || git log HEAD~5..HEAD --pretty=format:"- %s")
                  echo "body<<EOF" >> $GITHUB_OUTPUT
                  echo "## Resumo" >> $GITHUB_OUTPUT
                  echo "" >> $GITHUB_OUTPUT
                  echo "Merge automático de \`${SOURCE}\` → \`${TARGET}\`." >> $GITHUB_OUTPUT
                  echo "" >> $GITHUB_OUTPUT
                  echo "## Commits incluídos" >> $GITHUB_OUTPUT
                  echo "" >> $GITHUB_OUTPUT
                  echo "${COMMITS}" >> $GITHUB_OUTPUT
                  echo "" >> $GITHUB_OUTPUT
                  echo "## Checklist" >> $GITHUB_OUTPUT
                  echo "" >> $GITHUB_OUTPUT
                  echo "- [ ] Código compila sem erros (\`dotnet build\`)" >> $GITHUB_OUTPUT
                  echo "- [ ] Testes passam (\`dotnet test\`)" >> $GITHUB_OUTPUT
                  echo "- [ ] Code review realizado" >> $GITHUB_OUTPUT
                  echo "- [ ] Sem breaking changes não documentados" >> $GITHUB_OUTPUT
                  echo "" >> $GITHUB_OUTPUT
                  echo "> 🤖 Este PR foi gerado automaticamente pela action \`auto-pr.yml\`." >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Create Pull Request
              if: steps.check-pr.outputs.exists == 'false'
              uses: actions/github-script@v7
              with:
                  script: |
                      const pr = await github.rest.pulls.create({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        title: '${{ steps.pr-title.outputs.title }}',
                        head: '${{ steps.branches.outputs.source }}',
                        base: '${{ steps.branches.outputs.target }}',
                        body: `${{ steps.pr-title.outputs.body }}`
                      });
                      core.notice(`PR created: ${pr.data.html_url}`);
                      core.setOutput('pr_url', pr.data.html_url);

            - name: Add labels to PR
              if: steps.check-pr.outputs.exists == 'false' || steps.check-pr.outputs.pr_number != ''
              uses: actions/github-script@v7
              with:
                  script: |
                      const prNumber = ${{ steps.check-pr.outputs.pr_number || '0' }};
                      if (prNumber === 0) {
                        // PR was just created, get number from previous step output
                        const url = '${{ steps.create-pr.outputs.pr_url || '' }}';
                        if (!url) return;
                        const match = url.match(/\/pull\/(\d+)$/);
                        if (!match) return;
                        prNumber = parseInt(match[1]);
                      }
                      // Add labels based on branch prefix
                      const source = '${{ steps.branches.outputs.source }}';
                      const labels = ['auto-pr'];
                      if (source.startsWith('feature/')) labels.push('enhancement');
                      if (source.startsWith('fix/')) labels.push('bug');
                      if (source.startsWith('hotfix/')) labels.push('hotfix');
                      await github.rest.issues.addLabels({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: prNumber,
                        labels: labels
                      });

            - name: Summary
              run: |
                  if [ "${{ steps.check-pr.outputs.exists }}" = "true" ]; then
                    echo "✅ PR já existente: ${{ steps.check-pr.outputs.pr_url }}"
                  else
                    echo "✅ PR criado com sucesso!"
                  fi
