version: "3.8"
name: folha360

networks:
  folha360-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  seq-data:
  prometheus-data:
  grafana-data:

services:
  postgres:
    image: postgres:16
    container_name: folha360-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: folha360
      POSTGRES_USER: folha360_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Folha360@Dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - folha360-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U folha360_user -d folha360"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: folha360-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-Folha360@Dev}
    volumes:
      - redis-data:/data
    networks:
      - folha360-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: folha360-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/rabbitmq/init.sh:/docker-entrypoint-init.d/init.sh
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-folha360}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Folha360@Dev}
    networks:
      - folha360-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: folha360-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - folha360-net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: folha360-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - folha360-net
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/folha360-documentos --ignore-existing;
      mc policy set public local/folha360-documentos;
      echo 'MinIO initialized successfully';
      "

  seq:
    image: datalust/seq:latest
    container_name: folha360-seq
    ports:
      - "5341:5341"
      - "5342:5342"
    environment:
      ACCEPT_EULA: Y
    volumes:
      - seq-data:/data
    networks:
      - folha360-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: folha360-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    networks:
      - folha360-net
    depends_on:
      - folha360-webapi
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: folha360-prometheus
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - folha360-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: folha360-grafana
    profiles:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - folha360-net
    depends_on:
      - prometheus
    restart: unless-stopped

  folha360-webapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: folha360-webapi
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=folha360;Username=folha360_user;Password=${POSTGRES_PASSWORD:-Folha360@Dev}
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD:-Folha360@Dev}
      ConnectionStrings__RabbitMQ: amqp://${RABBITMQ_USER:-folha360}:${RABBITMQ_PASSWORD:-Folha360@Dev}@rabbitmq:5672
      Jwt__Secret: ${JWT_SECRET:-Folha360@DevSecretKey@2026!TempKey}
      Seq__Url: http://seq:5341
    networks:
      - folha360-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
