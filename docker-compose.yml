version: "3.8"
name: folha360

# =============================================================================
# INFRAESTRUTURA BASE
# Uso: docker compose up -d
# App + monitoramento: docker compose -f docker-compose.yml -f docker-compose.app.yml up -d
# =============================================================================

networks:
  folha360-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  seq-data:

services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: folha360-postgres:local
    container_name: folha360-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: folha360
      POSTGRES_USER: folha360_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Folha360@Dev}
      POSTGRES_INITDB_ARGS: "--locale=pt_BR.UTF-8 --encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - folha360-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U folha360_user -d folha360"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: folha360-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-Folha360@Dev}
    volumes:
      - redis-data:/data
    networks:
      - folha360-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: folha360-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/rabbitmq/init.sh:/docker-entrypoint-init.d/init.sh
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-folha360}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Folha360@Dev}
    networks:
      - folha360-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: folha360-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - folha360-net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: folha360-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - folha360-net
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/folha360-documentos --ignore-existing;
      mc policy set public local/folha360-documentos;
      echo 'MinIO initialized successfully';
      "

  seq:
    image: datalust/seq:latest
    container_name: folha360-seq
    ports:
      - "5341:5341"
      - "5342:5342"
    environment:
      ACCEPT_EULA: Y
    volumes:
      - seq-data:/data
    networks:
      - folha360-net
    restart: unless-stopped
